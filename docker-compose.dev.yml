services:
  postgres:
    image: postgres:16-alpine
    container_name: scrapify-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: scrapify
      POSTGRES_PASSWORD: scrapify_dev
      POSTGRES_DB: scrapify
    ports:
      - "5432:5432"
    volumes:
      - scrapify_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scrapify -d scrapify"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: scrapify-redis-dev
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - scrapify_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  scrapify_pg:
  scrapify_redis:
